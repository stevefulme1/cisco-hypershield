---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  NAMESPACE: stevefulme1
  COLLECTION: cisco_hypershield

jobs:
  ansible-lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yamllint flake8 ansible-lint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Run yamllint
        run: yamllint .
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Run flake8
        run: flake8 --max-line-length=120 --ignore=E402,W503 plugins/ tests/
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Run ansible-lint
        run: ansible-lint --strict
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

  sanity:
    name: Sanity (Ⓐ${{ matrix.ansible }} / py${{ matrix.python }})
    needs: ansible-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "2.16"
          - "2.17"
          - "2.18"
          - "2.20"
        python:
          - "3.12"
          - "3.13"
        exclude:
          - ansible: "2.16"
            python: "3.13"
          - ansible: "2.17"
            python: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Run sanity tests
        run: ansible-test sanity --docker -v --color --skip-test pep8 --skip-test validate-modules --exclude extensions/
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

  units:
    name: Unit tests
    needs: sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install "ansible-core>=2.16"

      - name: Run unit tests
        run: ansible-test units --docker -v --color --python 3.12
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

  integration:
    name: Integration tests
    needs: sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install "ansible-core>=2.16"

      - name: Run integration tests
        run: ansible-test integration --docker -v --color --python 3.12
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
