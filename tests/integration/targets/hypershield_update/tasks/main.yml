---
- name: Create an update campaign
  stevefulme1.cisco_hypershield.hypershield_update:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-update-campaign
    state: present
    target_version: "2.0.0"
    strategy: rolling
    max_parallel: 5
    canary_percentage: 10
    auto_start: false
  register: create_result

- name: Verify campaign was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.campaign.name == 'ci-update-campaign'

- name: Create same campaign again (idempotency)
  stevefulme1.cisco_hypershield.hypershield_update:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-update-campaign
    state: present
    target_version: "2.0.0"
    strategy: rolling
    max_parallel: 5
    canary_percentage: 10
    auto_start: false
  register: idem_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Update campaign max_parallel
  stevefulme1.cisco_hypershield.hypershield_update:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-update-campaign
    state: present
    target_version: "2.0.0"
    strategy: rolling
    max_parallel: 10
  register: update_result

- name: Verify campaign was updated
  ansible.builtin.assert:
    that:
      - update_result is changed

- name: Delete the campaign
  stevefulme1.cisco_hypershield.hypershield_update:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-update-campaign
    state: absent
  register: delete_result

- name: Verify campaign was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
