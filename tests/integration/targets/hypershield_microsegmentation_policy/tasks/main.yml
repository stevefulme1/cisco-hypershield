---
- name: Create a microsegmentation policy
  stevefulme1.cisco_hypershield.hypershield_microsegmentation_policy:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-web-to-db
    state: present
    source_labels:
      app: web
    destination_labels:
      app: database
    protocol: tcp
    ports:
      - 5432
    action: allow
    priority: 100
    description: Integration test policy
  register: create_result

- name: Verify policy was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.policy.name == 'ci-web-to-db'

- name: Create same policy again (idempotency)
  stevefulme1.cisco_hypershield.hypershield_microsegmentation_policy:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-web-to-db
    state: present
    source_labels:
      app: web
    destination_labels:
      app: database
    protocol: tcp
    ports:
      - 5432
    action: allow
    priority: 100
    description: Integration test policy
  register: idem_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Update policy ports
  stevefulme1.cisco_hypershield.hypershield_microsegmentation_policy:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-web-to-db
    state: present
    source_labels:
      app: web
    destination_labels:
      app: database
    protocol: tcp
    ports:
      - 5432
      - 5433
    action: allow
    priority: 100
  register: update_result

- name: Verify policy was updated
  ansible.builtin.assert:
    that:
      - update_result is changed

- name: Delete the policy
  stevefulme1.cisco_hypershield.hypershield_microsegmentation_policy:
    api_url: "{{ hypershield_api_url }}"
    api_key: "{{ hypershield_api_key }}"
    validate_certs: "{{ hypershield_validate_certs }}"
    name: ci-web-to-db
    state: absent
  register: delete_result

- name: Verify policy was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
